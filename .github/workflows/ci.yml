name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint . --ext .js,.ts,.tsx --max-warnings 0
        continue-on-error: false

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test
