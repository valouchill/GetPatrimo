services:
  getpatrimo:
    build: .
    container_name: getpatrimo-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      # MongoDB depuis Docker : utilise le nom du service ou l'IP de l'hôte
      - MONGO_URI=mongodb://admin:password123@mongodb:27017/doc2loc?authSource=admin
    volumes:
      - ./uploads:/opt/doc2loc/uploads
      - ./public:/opt/doc2loc/public
      - ./src:/opt/doc2loc/src
      - ./app:/opt/doc2loc/app
      - ./models:/opt/doc2loc/models
      - ./lib:/opt/doc2loc/lib
      - ./.next:/opt/doc2loc/.next
      - ./server.js:/opt/doc2loc/server.js
      - ./package.json:/opt/doc2loc/package.json
      - ./.env:/opt/doc2loc/.env:ro
    networks:
      - doc2loc-net
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  doc2loc-net:
    external: true
