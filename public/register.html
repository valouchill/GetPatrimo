<html lang='fr'>
<head>
  <meta charset='UTF-8'>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Inscription Doc2Loc</title>
  
    <link rel='stylesheet' href='/ui.css?v=10'>
<link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css'>

  <link rel="stylesheet" href="/elite.css"/>
    <script defer src='/ui.js?v=10'></script>
    <link rel='stylesheet' href='/harmonize.css?v=6'>
</head>
<body>
  <main class='container'>
    <article>
      <header><h1>📝 Créer un compte</h1></header>

      <div id="draftNote" style="display:none; padding:.75rem 1rem; border:1px solid #e5e7eb; border-radius:12px; margin-bottom:1rem;">
        ✅ On a trouvé un brouillon (bien/locataire). Après inscription, on l’importe automatiquement.
      </div>

      <form id='regForm'>
        <input type='text' id='email' placeholder='Email' required>
        <input type='password' id='password' placeholder='Mot de passe (min 6)' required>
        <button type='submit' class='contrast'>S'inscrire</button>
      </form>

      <footer>
        <small>Déjà un compte ? <a href='/login.html'>Se connecter</a></small><br/>
        <small><a href='/'>← Retour à la landing</a></small>
      </footer>
    </article>
  </main>

  <script>
    const DRAFT_KEY = "doc2loc_draft_v1";
    try{
      const raw = localStorage.getItem(DRAFT_KEY);
      if(raw){ document.getElementById("draftNote").style.display="block"; }
    }catch(e){}

    async function importDraftAndRedirect() {
      const tok = localStorage.getItem("token");
      if(!tok){ window.location.href="/dashboard.html"; return; }

      let draft = null;
      try{ draft = JSON.parse(localStorage.getItem(DRAFT_KEY) || "null"); }catch(e){ draft=null; }
      if(!draft || !draft.property){ window.location.href="/dashboard.html"; return; }

      const p = draft.property || {};
      const payload = {
        name: p.name,
        rentAmount: p.rentAmount,
        chargesAmount: p.chargesAmount,
        addressLine: p.addressLine,
        zipCode: p.zipCode,
        city: p.city
      };

      try{
        const r = await fetch("/api/properties", {
          method:"POST",
          headers:{ "Content-Type":"application/json", "x-auth-token": tok },
          body: JSON.stringify(payload)
        });
        const created = await r.json().catch(()=>({}));
        if(!r.ok){
          window.location.href="/dashboard.html";
          return;
        }

        const t = (draft.tenant || {});
        if(t.email && String(t.email).includes("@")){
          await fetch("/api/tenants", {
            method:"POST",
            headers:{ "Content-Type":"application/json", "x-auth-token": tok },
            body: JSON.stringify({
              firstName: t.firstName || "Locataire",
              lastName: t.lastName || "",
              email: t.email,
              property: created._id
            })
          }).catch(()=>{});
        }

        localStorage.removeItem(DRAFT_KEY);
        window.location.href = "/property.html?id=" + encodeURIComponent(created._id);
      }catch(e){
        window.location.href="/dashboard.html";
      }
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if(!password || password.length < 6){
        alert("Mot de passe trop court (min 6).");
        return;
      }

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const j = await res.json().catch(()=>({}));

      if (res.ok) {
        // auto-login direct
        const res2 = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res2.json().catch(()=>({}));
        if(res2.ok){
          localStorage.setItem('token', data.token);
          await importDraftAndRedirect();
        }else{
          window.location.href = '/login.html';
        }
      } else {
        alert(j.msg || 'Erreur inscription');
      }
    });
  </script>
</body>
</html>
